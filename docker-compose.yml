version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./clinic.db}
      - VAPI_API_KEY=${VAPI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
    volumes:
      - ./clinic.db:/app/clinic.db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./clinic.db}
    volumes:
      - ./clinic.db:/app/clinic.db
    command: python monitoring/dashboard.py 8080
    depends_on:
      - backend
